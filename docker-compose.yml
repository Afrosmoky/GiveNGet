version: '3.8'

# ─────────────────────────────────────────────────────────────
#  GiveNGet — pełny stack (MySQL + Backend + Frontend)
#
#  Demo (VPS):   cp .env.demo .env && docker compose up -d --build
#  Lokalnie:     cp .env.local .env && docker compose up -d --build
# ─────────────────────────────────────────────────────────────

services:

  # ── MySQL 8 ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: gng-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootgng2026!
      MYSQL_DATABASE: gngdev
      MYSQL_USER: gnguser123
      MYSQL_PASSWORD: 1SWfA398k7
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - gng-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootgng2026!"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Backend (Spring Boot) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: gng-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Nadpisuje server.host=localhost z application-dev.properties
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gngdev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: gnguser123
      SPRING_DATASOURCE_PASSWORD: 1SWfA398k7
      # URL frontendu — używany w linkach w mailach (aktywacja, reset hasła)
      FRONT_APP_URL: ${FRONT_APP_URL:-http://localhost:3000}
      # CORS dla WebSocket — musi zgadzać się z origins frontendu
      CORS_ALLOWED_ORIGIN: ${FRONT_APP_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    volumes:
      # Persystencja uploadowanych zdjęć między restartami kontenera
      - uploads-data:/app/uploads
    networks:
      - gng-net

  # ── Frontend (Next.js) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_API_URL jest "wypalany" w bundle podczas budowania!
        # Zmiana URL = trzeba przebudować obraz (docker compose up -d --build frontend)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_ENVIRONMENT: ${NEXT_PUBLIC_ENVIRONMENT:-production}
    container_name: gng-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - gng-net

# ── Volumes ───────────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local
  uploads-data:
    driver: local

# ── Network ───────────────────────────────────────────────────
networks:
  gng-net:
    driver: bridge
